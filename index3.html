<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up</title>
    <link rel="stylesheet" href="./style2.css" />
  </head>
  <body>
    <div class="card">
      <div class="ok">
        <div class="darc">
          <h1>Welcome to our online restaurant!</h1>
        </div>
      </div>
      <div class="barc">
        <form id="signupForm">
          <label class="user">First Name</label>
          <input type="text" class="text1" id="firstName" />

          <label class="user">Last Name</label>
          <input type="text" class="text1" id="lastName" />

          <label class="user">Age</label>
          <input type="number" class="text1" id="age" />

          <label class="user">Email</label>
          <input type="email" class="text1" id="email" />

          <label class="user">Address</label>
          <input type="text" class="text1" id="address" />

          <label class="user">Phone</label>
          <input type="text" class="text1" id="phone" />

          <label class="user">Zipcode</label>
          <input type="text" class="text1" id="zipcode" />

          <label class="user">Avatar URL</label>
          <input type="text" class="text1" id="avatar" />

          <label class="user">Gender</label>
          <select name="gender" id="gender" class="gender">
            <option value="1">male</option>
            <option value="2">female</option>
          </select>

          <label class="pass">Password</label>
          <input type="password" class="pass1" id="password" />

          <button type="submit">Sign up</button>
        </form>
      </div>
      <span class="spani"
        ><h3>Don't have an account yet?</h3>
        <a href="./index2.html">log in</a></span
      >
    </div>

    <script src="./signup.js"></script>
  </body>
</html>
